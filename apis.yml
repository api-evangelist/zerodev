aid: zerodev
url: https://raw.githubusercontent.com/api-evangelist/zerodev/refs/heads/main/apis.yml
name: ZeroDev
kind: company
description: ZeroDev is account-abstraction / smart-wallet infrastructure for EVM
  chains. It runs an ERC-4337 (and EIP-7702) bundler RPC and a paymaster RPC, both
  exposed as JSON-RPC over HTTPS, plus the Kernel smart-account SDK and a meta-aggregator
  (Smart Routing). Apps sponsor gas, let users pay gas in ERC-20s, and submit
  UserOperations through a single project-scoped RPC endpoint.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Account Abstraction
- Smart Wallets
- ERC-4337
- EIP-7702
- Paymaster
- Bundler
- JSON-RPC
- Web3
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
apis:
- aid: zerodev:zerodev-bundler-rpc
  name: ZeroDev Bundler RPC
  tags:
  - Bundler
  - ERC-4337
  - UserOperation
  - JSON-RPC
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.zerodev.app/meta-infra/rpcs
  baseURL: https://rpc.zerodev.app/api/v3/{projectId}/chain/{chainId}
  properties:
  - url: https://docs.zerodev.app/meta-infra/rpcs
    type: Documentation
  - url: https://docs.zerodev.app/meta-infra/rpcs
    type: APIReference
  - url: openapi/zerodev-openapi.yml
    type: OpenAPI
  - url: collections/zerodev.postman_collection.json
    type: Postman
  description: ERC-4337 bundler exposed as JSON-RPC over HTTPS. A single POST to the
    project-scoped RPC URL carries methods eth_sendUserOperation,
    eth_estimateUserOperationGas, eth_getUserOperationByHash,
    eth_getUserOperationReceipt, eth_supportedEntryPoints, and eth_chainId for
    EntryPoint v0.6 and v0.7. Authentication is by project ID embedded in the URL
    path; append ?provider=ULTRA_RELAY to route through ZeroDev UltraRelay.
- aid: zerodev:zerodev-paymaster-rpc
  name: ZeroDev Paymaster RPC
  tags:
  - Paymaster
  - Gas Sponsorship
  - ERC-7677
  - JSON-RPC
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.zerodev.app/sdk/core-api/sponsor-gas
  baseURL: https://rpc.zerodev.app/api/v3/{projectId}/chain/{chainId}
  properties:
  - url: https://docs.zerodev.app/sdk/core-api/sponsor-gas
    type: Documentation
  - url: https://docs.zerodev.app/meta-infra/rpcs
    type: APIReference
  - url: openapi/zerodev-openapi.yml
    type: OpenAPI
  - url: collections/zerodev.postman_collection.json
    type: Postman
  description: Verifying and ERC-20 paymaster exposed as JSON-RPC over the same
    project-scoped RPC URL. Methods include zd_sponsorUserOperation (ZeroDev
    sponsorship), pm_sponsorUserOperation (Pimlico-compatible sponsorship), the
    ERC-7677 pair pm_getPaymasterStubData / pm_getPaymasterData, and
    zd_getERC20PaymasterAddress for paying gas with ERC-20 tokens. Returns the
    signed paymaster fields the bundler needs.
- aid: zerodev:zerodev-kernel-sdk
  name: ZeroDev Kernel SDK
  tags:
  - Kernel
  - SDK
  - Smart Account
  - EIP-7702
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.zerodev.app/sdk/getting-started/quickstart
  baseURL: https://rpc.zerodev.app/api/v3/{projectId}/chain/{chainId}
  properties:
  - url: https://docs.zerodev.app/sdk/getting-started/quickstart
    type: Documentation
  - url: https://github.com/zerodevapp/sdk
    type: SourceCode
  - url: openapi/zerodev-openapi.yml
    type: OpenAPI
  description: Kernel is ZeroDev's modular ERC-4337 and EIP-7702 smart-account
    implementation. The TypeScript Kernel SDK (built on viem / permissionless)
    builds and signs UserOperations, then drives the bundler and paymaster RPCs.
    Kernel v3 supports EIP-7702 delegation alongside classic 4337 deployment.
- aid: zerodev:zerodev-meta-aggregator
  name: ZeroDev Meta-Aggregator (Smart Routing)
  tags:
  - Meta-Aggregator
  - Smart Routing
  - Cross-Chain
  - Intents
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://docs.zerodev.app/sdk/infra/intro
  baseURL: https://rpc.zerodev.app/api/v3/{projectId}/chain/{chainId}
  properties:
  - url: https://docs.zerodev.app/sdk/infra/intro
    type: Documentation
  - url: openapi/zerodev-openapi.yml
    type: OpenAPI
  description: ZeroDev's meta-infrastructure aggregates underlying bundler and
    paymaster providers behind one project-scoped RPC, with Smart Routing that lets
    users deposit and have assets routed across chains. Provider selection is
    controlled with the ?provider query parameter (e.g. ULTRA_RELAY).
