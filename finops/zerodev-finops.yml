- FOCUS
description: >-
  FinOps view of ZeroDev spend. ZeroDev bills a flat monthly plan fee
  (Developer / Growth / Scale / Enterprise) that includes a pool of Credits
  consumed by UserOperations and infra calls, plus an included gas-sponsorship
  budget. The two primary cost drivers are (1) Credit consumption from UserOp
  volume across the bundler and paymaster RPCs and (2) on-chain gas sponsored to
  users via the paymaster, which is drawn from the included allowance and then
  billed at cost. Paying gas with ERC-20s and self-funded paymasters shift gas
  cost onto the end user or the project's own deposited funds.
notes: >-
  Plan fees, included Credits, and included gas-sponsorship amounts are subject
  to change; verify against the ZeroDev pricing page and dashboard usage during
  reconciliation.
sources:
- https://zerodev.app/pricing
- https://docs.zerodev.app/meta-infra/rpcs
