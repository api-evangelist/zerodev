aid: zerodev
name: ZeroDev
review:
  question: Does ZeroDev expose a documented public REST API, or a streaming (WebSocket/SSE) API?
  answer: false
  date: '2026-06-20'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was created. ZeroDev's bundler and paymaster are
    request/response JSON-RPC 2.0 over HTTPS (synchronous HTTP POST). No
    documented WebSocket (ws:// / wss://) or Server-Sent Events (SSE)
    streaming surface exists for the bundler or paymaster, so there is no
    real streaming transport to model under the updated AsyncAPI scope.
findings:
  summary: |
    ZeroDev does NOT expose a conventional REST API for its core account-
    abstraction infrastructure. The bundler and paymaster are JSON-RPC 2.0
    services accessed by HTTP POST to a single project-scoped URL:
    https://rpc.zerodev.app/api/v3/{projectId}/chain/{chainId}. The RPC
    method is selected by the "method" field of the request body, not by an
    HTTP path/verb, so the surface is best modeled as one POST endpoint that
    multiplexes the documented ERC-4337 bundler methods and the ZeroDev /
    ERC-7677 paymaster methods. Authentication is by project ID embedded in
    the URL path (no header key). A ?provider query parameter (e.g.
    ULTRA_RELAY) selects the underlying provider. A separate REST-style
    dashboard/management API exists for project, team, account, and gas-
    sponsorship administration, but the developer-facing runtime surface is
    JSON-RPC. The Kernel SDK (TypeScript, built on viem/permissionless) is
    the recommended client and constructs/signs UserOperations before
    calling these RPCs.
  transports:
    - protocol: JSON-RPC
      scheme: https
      baseURL: https://rpc.zerodev.app/api/v3/{projectId}/chain/{chainId}
      documented: true
      note: JSON-RPC 2.0 over HTTPS POST; method selected via request body "method" field.
    - protocol: REST
      scheme: https
      documented: partial
      note: A dashboard/management REST API exists for projects, teams, accounts, and gas-sponsorship config; it is not the runtime bundler/paymaster surface.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented for the bundler or paymaster.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events streaming is documented for the bundler or paymaster.
  jsonRpcMethodsBundler:
    - eth_sendUserOperation
    - eth_estimateUserOperationGas
    - eth_getUserOperationByHash
    - eth_getUserOperationReceipt
    - eth_supportedEntryPoints
    - eth_chainId
  jsonRpcMethodsPaymaster:
    - zd_sponsorUserOperation
    - pm_sponsorUserOperation
    - pm_getPaymasterStubData
    - pm_getPaymasterData
    - zd_getERC20PaymasterAddress
  entryPoints:
    - EntryPoint v0.6
    - EntryPoint v0.7
  notes: |
    The bundler implements the standard ERC-4337 method set; the paymaster
    implements both ZeroDev-native (zd_*) sponsorship and the
    Pimlico-compatible / ERC-7677 (pm_*) methods. ERC-20 gas payment resolves
    a paymaster address via zd_getERC20PaymasterAddress. UltraRelay is
    ZeroDev's optimized relay, selected with ?provider=ULTRA_RELAY.
sources:
  - url: https://docs.zerodev.app/meta-infra/rpcs
    type: Documentation
    note: Bundler & Paymaster RPCs; project-scoped RPC URL and ?provider=ULTRA_RELAY.
  - url: https://docs.zerodev.app/sdk/core-api/sponsor-gas
    type: Documentation
    note: Gas sponsorship via the paymaster RPC (zd_/pm_ sponsorship methods).
  - url: https://docs.zerodev.app/sdk/core-api/pay-gas-with-erc20s
    type: Documentation
    note: Paying gas with ERC-20 tokens via the ERC-20 paymaster.
  - url: https://docs.zerodev.app/sdk/getting-started/quickstart
    type: Documentation
    note: Kernel SDK quickstart; client builds/signs UserOperations and drives the RPCs.
  - url: https://zerodev.app/pricing
    type: Pricing
    note: Developer / Growth / Scale / Enterprise plans with Credits and gas-sponsorship budgets.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No streaming (WebSocket/SSE) surface exists, so no AsyncAPI was authored.
    The OpenAPI at openapi/zerodev-openapi.yml models the single JSON-RPC POST
    endpoint with method/params/jsonrpc envelopes and documents the real
    ERC-4337 and paymaster methods in descriptions and examples, accurately
    representing JSON-RPC transport rather than fabricating REST resources.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
